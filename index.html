<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ขอเบิกวัสดุ/ใช้รถ</title>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  :root {
    --primary: #06c755;
    --primary-dark: #05a648;
    --bg: #f4f6f5;
    --card: #ffffff;
    --border: #dfe3e0;
    --text: #1c1c1c;
    --text-muted: #6b7280;
    --error: #d64545;
    --warn: #b8860b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Sarabun", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 18px 20px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 700; }
  header p { margin: 4px 0 0; font-size: 13px; opacity: 0.9; }

  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 62px;
    z-index: 19;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab-btn.active {
    color: var(--primary-dark);
    border-bottom-color: var(--primary);
  }

  #profile-bar {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 10px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  #profile-bar .profile-row { display: flex; align-items: center; gap: 10px; }
  #profile-bar img { width: 28px; height: 28px; border-radius: 50%; }
  #profile-bar .userid-row { font-size: 11px; color: var(--text-muted); }
  #profile-bar .userid-row span { user-select: all; word-break: break-all; }

  .view { display: none; }
  .view.active { display: block; }

  form { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  .field {
    background: var(--card);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    position: relative;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field label .required { color: var(--error); }

  select, input, textarea {
    width: 100%;
    border: none;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: transparent;
    outline: none;
    padding: 4px 0;
  }
  textarea { resize: vertical; min-height: 60px; }

  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  .dropdown-list {
    display: none;
    position: absolute;
    left: 14px;
    right: 14px;
    top: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 4px;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    z-index: 15;
  }
  .dropdown-item {
    padding: 10px 12px;
    font-size: 15px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: #f4f6f5; }

  button[type="submit"] {
    background: var(--primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  button[type="submit"]:active { background: var(--primary-dark); }
  button[type="submit"]:disabled { opacity: 0.6; }

  #cancel-edit-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    display: none;
  }

  #status-msg {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
  }
  #status-msg.success { display: block; background: #e6f9ee; color: var(--primary-dark); }
  #status-msg.error { display: block; background: #fdecec; color: var(--error); }

  .hint { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  #form-title-hint {
    font-size: 13px;
    font-weight: 600;
    color: var(--warn);
    padding: 0 16px;
    display: none;
  }

  /* ====== คำขอของฉัน ====== */
  #my-requests-view { padding: 16px; display: none; flex-direction: column; gap: 12px; }
  #my-requests-view.active { display: flex; }

  .request-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .request-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .status-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-pending { background: #fff4e0; color: var(--warn); }
  .status-cancelled { background: #f1f1f1; color: var(--text-muted); }
  .status-done { background: #e6f9ee; color: var(--primary-dark); }

  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-small {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-small.edit-btn { color: var(--primary-dark); border-color: var(--primary); }
  .btn-small.cancel-btn { color: var(--error); border-color: var(--error); }

  .site-status-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .site-status-current {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .site-status-current.pending-work { background: #fff4e0; color: var(--warn); }
  .site-status-current.ready { background: #e6f9ee; color: var(--primary-dark); }
  .site-status-current.not-ready { background: #fdecec; color: var(--error); }
  .site-status-current.ready-now { background: #e3f0fd; color: #1565c0; }

  .site-status-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-tiny {
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-tiny.status-yellow { color: var(--warn); border-color: var(--warn); }
  .btn-tiny.status-green { color: var(--primary-dark); border-color: var(--primary); }
  .btn-tiny.status-red { color: var(--error); border-color: var(--error); }
  .btn-tiny.status-blue { color: #1565c0; border-color: #1565c0; }

  #refresh-btn {
    align-self: flex-end;
    background: transparent;
    border: none;
    color: var(--primary-dark);
    font-size: 13px;
    cursor: pointer;
    padding: 4px;
  }

  .site-note-log {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    white-space: pre-line;
    background: #f8f9f8;
    border-radius: 8px;
    padding: 8px 10px;
  }

  /* ====== custom note modal (แทน window.prompt เพราะเบราว์เซอร์จะโชว์ชื่อโดเมนเอง) ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: flex-end;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: white;
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 18px 18px 22px;
    animation: modal-up 0.15s ease-out;
  }
  @keyframes modal-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  #note-modal-textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #note-modal-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  #note-modal-confirm { background: var(--primary); border: none; color: white; }
</style>
</head>
<body>

<header>
  <h1>ขอเบิกวัสดุ / ขอใช้รถ</h1>
  <p>กรอกครั้งเดียว ข้อมูลเข้าระบบทันที ไม่ต้องถ่ายรูปส่งอีกต่อไป</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="form-view">ส่งคำขอใหม่</button>
  <button class="tab-btn" data-tab="my-requests-view">คำขอของฉัน</button>
</div>

<div id="profile-bar"><span id="loading-profile">กำลังโหลดข้อมูลผู้ใช้...</span></div>

<!-- ============ แท็บ 1: ฟอร์มส่งคำขอ / แก้ไขคำขอ ============ -->
<div id="form-view" class="view active">

  <div id="form-title-hint">กำลังแก้ไขคำขอเดิม</div>

  <form id="request-form" novalidate>

    <div class="field">
      <label>ผู้ขอเบิก <span class="required">*</span></label>
      <input type="text" id="requester-input" placeholder="พิมพ์เพื่อค้นหา หรือพิมพ์ชื่อใหม่" autocomplete="off">
      <div class="dropdown-list" id="requester-list"></div>
      <div class="hint">ระบบเติมชื่อ LINE ให้อัตโนมัติ แก้ไขได้ตามจริง</div>
    </div>

    <div class="field">
      <label>รหัส/ชื่อหน้างาน <span class="required">*</span></label>
      <input type="text" id="site-input" placeholder="พิมพ์เพื่อค้นหา หรือพิมพ์งานใหม่" autocomplete="off">
      <div class="dropdown-list" id="site-list"></div>
    </div>

    <div class="row">
      <div class="field">
        <label>วันเริ่มงานที่ต้องการรถ <span class="required">*</span></label>
        <input type="date" id="start-date">
      </div>
    </div>

    <div class="field">
      <label>วัสดุ <span class="required">*</span></label>
      <input type="text" id="material-input" placeholder="พิมพ์เพื่อค้นหา หรือพิมพ์วัสดุใหม่" autocomplete="off">
      <div class="dropdown-list" id="material-list"></div>
    </div>

    <div class="row">
      <div class="field">
        <label>ปริมาณ <span class="required">*</span></label>
        <input type="number" id="quantity" min="0" step="0.1">
      </div>
      <div class="field">
        <label>หน่วย <span class="required">*</span></label>
        <select id="unit">
          <option value="">-- เลือก --</option>
          <option value="เที่ยว">เที่ยว</option>
          <option value="พ่วง">พ่วง</option>
          <option value="ตัน">ตัน</option>
          <option value="คัน">คัน</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>จำนวนคัน (ถ้าทราบ)</label>
      <input type="number" id="truck-count" min="0" step="1">
    </div>

    <div class="field">
      <label>แหล่งวัสดุ</label>
      <input type="text" id="source-input" placeholder="พิมพ์เพื่อค้นหา หรือพิมพ์แหล่งใหม่" autocomplete="off">
      <div class="dropdown-list" id="source-list"></div>
    </div>

    <div class="field">
      <label>ระยะทาง (กม.) โดยประมาณ</label>
      <input type="number" id="distance" min="0" step="0.1">
    </div>

    <div class="field">
      <label>พิกัดปลายทาง (ถ้าทราบ ไม่บังคับ)</label>
      <input type="text" id="location-input" placeholder="วางลิงก์ Google Maps หรือพิกัด เช่น 13.7563, 100.5018" autocomplete="off">
      <button type="button" id="use-location-btn" class="btn-small" style="margin-top:8px;width:100%;">📍 ใช้พิกัดปัจจุบัน</button>
      <div class="hint">กดปุ่มถ้ากำลังยืนอยู่หน้างานจริง หรือวางลิงก์แผนที่ก็ได้</div>
    </div>

    <div class="field">
      <label>รายละเอียดงาน / หมายเหตุ</label>
      <textarea id="detail" placeholder="เช่น ทอยหินกองสต๊อกหน้างาน, เสริมทรายจุดที่ยุบ ฯลฯ"></textarea>
    </div>

    <div class="field">
      <label>เบอร์ติดต่อหน้างาน</label>
      <input type="tel" id="phone" placeholder="เช่น 081-3904854">
    </div>

    <div id="status-msg"></div>

    <button type="submit" id="submit-btn">ส่งคำขอ</button>
    <button type="button" id="cancel-edit-btn">ยกเลิกการแก้ไข กลับไปสร้างคำขอใหม่</button>
  </form>
</div>

<!-- ============ แท็บ 2: คำขอของฉัน ============ -->
<div id="my-requests-view" class="view">
  <button id="refresh-btn">รีเฟรช</button>
  <div id="my-requests-list"><p class="hint">กำลังโหลด...</p></div>
</div>

<!-- ============ กล่องกรอกหมายเหตุแบบ custom (แทน window.prompt) ============ -->
<div id="note-modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="note-modal-title">แจ้งสถานะหน้างาน</div>
    <textarea id="note-modal-textarea" placeholder="หมายเหตุเพิ่มเติม (ไม่บังคับ)"></textarea>
    <div class="modal-actions">
      <button type="button" id="note-modal-cancel">ยกเลิก</button>
      <button type="button" id="note-modal-confirm">ยืนยัน</button>
    </div>
  </div>
</div>

<script>
  // ============ ตั้งค่าที่ต้องแก้ก่อนใช้งานจริง ============
  const LIFF_ID = "2010592933-PmsdUucj";
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFKIOFrW0409FuCbhTKIypezN3f23GvaXb0gkRjNOwe89VsxeCd9II5qwtBKgEVDwGXw/exec";
  // ==========================================================

  window.addEventListener('error', (event) => {
    const box = document.getElementById('status-msg');
    if (box) {
      box.textContent = 'เกิดข้อผิดพลาดในหน้าเว็บ: ' + event.message;
      box.className = 'error';
      box.style.display = 'block';
    }
  });

  let lineProfile = null;
  let editingRequestId = null;
  let optionsData = { requesters: [], sites: [], materials: [], sources: [] };

  // ---------- LIFF init ----------
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      lineProfile = await liff.getProfile();
      document.getElementById('profile-bar').innerHTML = `
        <div class="profile-row">
          <img src="${lineProfile.pictureUrl || ''}" onerror="this.style.display='none'">
          <span>เข้าสู่ระบบเป็น: <strong>${lineProfile.displayName}</strong></span>
        </div>
        <div class="userid-row">LINE User ID (ใช้ตั้งค่าทดสอบแจ้งเตือน): <span>${lineProfile.userId}</span></div>
      `;
      const reqInput = document.getElementById('requester-input');
      if (!reqInput.value) reqInput.value = lineProfile.displayName;
    } catch (err) {
      document.getElementById('profile-bar').innerHTML =
        '<span style="color:#d64545">โหลดโปรไฟล์ LINE ไม่สำเร็จ (เปิดนอกแอป LINE หรือยังไม่ได้ตั้งค่า LIFF_ID)</span>';
    }
  }

  // ---------- โหลด dropdown จากชีต ----------
  async function loadOptions() {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=options');
      const result = await res.json();
      if (result.status === 'ok') optionsData = result.options;
    } catch (err) {
      console.error('โหลดตัวเลือกไม่สำเร็จ', err);
    }
  }

  // ---------- searchable dropdown ----------
  function setupSearchable(inputId, listId, getOptions) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);

    function render(filterText) {
      const options = getOptions();
      const uniq = [...new Set(options)];
      const filtered = filterText
        ? uniq.filter(o => o.toLowerCase().includes(filterText.toLowerCase()))
        : uniq;
      list.innerHTML = '';
      if (filtered.length === 0) { list.style.display = 'none'; return; }
      filtered.slice(0, 30).forEach(opt => {
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        item.textContent = opt;
        item.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          input.value = opt;
          list.style.display = 'none';
        });
        list.appendChild(item);
      });
      list.style.display = 'block';
    }

    input.addEventListener('input', () => render(input.value));
    input.addEventListener('focus', () => render(input.value));
    input.addEventListener('blur', () => setTimeout(() => { list.style.display = 'none'; }, 150));
  }

  // ---------- validate ----------
  function validateForm() {
    const missing = [];
    if (!document.getElementById('requester-input').value.trim()) missing.push('ผู้ขอเบิก');
    if (!document.getElementById('site-input').value.trim()) missing.push('รหัส/ชื่อหน้างาน');
    if (!document.getElementById('start-date').value) missing.push('วันเริ่มงาน');
    if (!document.getElementById('material-input').value.trim()) missing.push('วัสดุ');
    if (!document.getElementById('quantity').value) missing.push('ปริมาณ');
    if (!document.getElementById('unit').value) missing.push('หน่วย');
    return missing;
  }

  function resetFormToCreateMode() {
    editingRequestId = null;
    document.getElementById('request-form').reset();
    if (lineProfile) document.getElementById('requester-input').value = lineProfile.displayName;
    document.getElementById('submit-btn').textContent = 'ส่งคำขอ';
    document.getElementById('cancel-edit-btn').style.display = 'none';
    document.getElementById('form-title-hint').style.display = 'none';
  }

  // ---------- submit (create/edit) ----------
  document.getElementById('request-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');
    statusMsg.className = ''; statusMsg.style.display = 'none';

    const missing = validateForm();
    if (missing.length > 0) {
      statusMsg.textContent = 'กรุณากรอกให้ครบ: ' + missing.join(', ');
      statusMsg.className = 'error'; statusMsg.style.display = 'block';
      statusMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    btn.disabled = true;
    btn.textContent = editingRequestId ? 'กำลังบันทึก...' : 'กำลังส่ง...';

    const payload = {
      action: editingRequestId ? 'edit' : 'create',
      requestId: editingRequestId || undefined,
      requester: document.getElementById('requester-input').value.trim(),
      site: document.getElementById('site-input').value.trim(),
      startDate: document.getElementById('start-date').value,
      material: document.getElementById('material-input').value.trim(),
      quantity: document.getElementById('quantity').value,
      unit: document.getElementById('unit').value,
      truckCount: document.getElementById('truck-count').value,
      source: document.getElementById('source-input').value.trim(),
      distanceKm: document.getElementById('distance').value,
      location: document.getElementById('location-input').value.trim(),
      detail: document.getElementById('detail').value,
      phone: document.getElementById('phone').value,
      lineUserId: lineProfile ? lineProfile.userId : '',
      lineDisplayName: lineProfile ? lineProfile.displayName : '',
      channel: 'LIFF'
    };

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (result.status !== 'ok') throw new Error(result.message || 'unknown error');

      statusMsg.textContent = editingRequestId ? 'บันทึกการแก้ไขสำเร็จแล้ว' : 'ส่งคำขอสำเร็จแล้ว';
      statusMsg.className = 'success'; statusMsg.style.display = 'block';
      resetFormToCreateMode();
      setTimeout(() => { if (liff.isInClient && liff.isInClient()) liff.closeWindow(); }, 1800);

    } catch (err) {
      statusMsg.textContent = 'บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง (' + err.message + ')';
      statusMsg.className = 'error'; statusMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = editingRequestId ? 'บันทึกการแก้ไข' : 'ส่งคำขอ';
    }
  });

  document.getElementById('cancel-edit-btn').addEventListener('click', resetFormToCreateMode);

  // ---------- แท็บ "คำขอของฉัน" ----------
  function statusClass(status) {
    if (status === 'รอจัดคิว') return 'pending';
    if (status.indexOf('ยกเลิก') !== -1) return 'cancelled';
    return 'done';
  }

  function startEdit(r) {
    editingRequestId = r.requestId;
    document.querySelector('[data-tab="form-view"]').click();
    document.getElementById('requester-input').value = r.requester || '';
    document.getElementById('site-input').value = r.site || '';
    document.getElementById('start-date').value = r.startDate || '';
    document.getElementById('material-input').value = r.material || '';
    document.getElementById('quantity').value = r.quantity || '';
    document.getElementById('unit').value = r.unit || '';
    document.getElementById('truck-count').value = r.truckCount || '';
    document.getElementById('source-input').value = r.source || '';
    document.getElementById('distance').value = r.distanceKm || '';
    document.getElementById('location-input').value = r.location || '';
    document.getElementById('detail').value = r.detail || '';
    document.getElementById('phone').value = r.phone || '';
    document.getElementById('submit-btn').textContent = 'บันทึกการแก้ไข';
    document.getElementById('cancel-edit-btn').style.display = 'block';
    document.getElementById('form-title-hint').style.display = 'block';
  }

  async function doCancel(requestId) {
    if (!confirm('ยืนยันยกเลิกคำขอนี้?')) return;
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'cancel', requestId, lineUserId: lineProfile ? lineProfile.userId : '' })
      });
      const result = await res.json();
      if (result.status !== 'ok') throw new Error(result.message);
      loadMyRequests();
    } catch (err) {
      alert('ยกเลิกไม่สำเร็จ: ' + err.message);
    }
  }

  // กล่องกรอกหมายเหตุของเราเอง ใช้แทน window.prompt() เพราะ prompt() เบราว์เซอร์จะ
  // แปะชื่อโดเมน (เช่น "duangduen.github.io says") ไว้ให้เองโดยแก้ไข/ซ่อนด้วย JS ไม่ได้เลย
  function openNoteModal(titleText) {
    return new Promise((resolve) => {
      const overlay = document.getElementById('note-modal-overlay');
      const textarea = document.getElementById('note-modal-textarea');
      const title = document.getElementById('note-modal-title');
      const confirmBtn = document.getElementById('note-modal-confirm');
      const cancelBtn = document.getElementById('note-modal-cancel');

      title.textContent = titleText;
      textarea.value = '';
      overlay.classList.add('active');
      setTimeout(() => textarea.focus(), 50);

      function cleanup(result) {
        overlay.classList.remove('active');
        confirmBtn.removeEventListener('click', onConfirm);
        cancelBtn.removeEventListener('click', onCancel);
        resolve(result);
      }
      function onConfirm() { cleanup(textarea.value.trim()); }
      function onCancel() { cleanup(null); }

      confirmBtn.addEventListener('click', onConfirm);
      cancelBtn.addEventListener('click', onCancel);
    });
  }

  // ---------- ปุ่มใช้พิกัดปัจจุบัน ----------
  document.getElementById('use-location-btn').addEventListener('click', () => {
    const btn = document.getElementById('use-location-btn');
    if (!navigator.geolocation) {
      alert('อุปกรณ์/เบราว์เซอร์นี้ไม่รองรับการระบุพิกัด กรุณาวางลิงก์ Google Maps แทน');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'กำลังระบุตำแหน่ง...';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('location-input').value = `https://maps.google.com/?q=${latitude},${longitude}`;
        btn.disabled = false;
        btn.textContent = '📍 ใช้พิกัดปัจจุบัน';
      },
      (err) => {
        alert('ดึงพิกัดไม่สำเร็จ: ' + err.message + ' (ต้องกดอนุญาตสิทธิ์ตำแหน่งที่ตั้งก่อน ถ้าไม่ขึ้นให้ลองปิดเปิดแอป LINE ใหม่ หรือวางลิงก์แผนที่แทน)');
        btn.disabled = false;
        btn.textContent = '📍 ใช้พิกัดปัจจุบัน';
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  // แปลงค่าที่กรอกไว้ (ลิงก์หรือพิกัดดิบ) ให้เป็นลิงก์เปิด Google Maps ได้เสมอ
  function locationHref(loc) {
    if (!loc) return '';
    return /^https?:\/\//i.test(loc) ? loc : ('https://maps.google.com/?q=' + encodeURIComponent(loc));
  }

  function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  async function doUpdateSiteStatus(requestId, siteStatus) {
    const note = await openNoteModal('แจ้งสถานะ: ' + siteStatus);
    if (note === null) return; // กดยกเลิก
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'updateSiteStatus',
          requestId,
          siteStatus,
          note,
          lineUserId: lineProfile ? lineProfile.userId : ''
        })
      });
      const result = await res.json();
      if (result.status !== 'ok') throw new Error(result.message);
      loadMyRequests();
    } catch (err) {
      alert('อัปเดตไม่สำเร็จ: ' + err.message);
    }
  }

  function siteStatusClass(siteStatus) {
    if (siteStatus === 'ยังไม่เสร็จ') return 'pending-work';
    if (siteStatus === 'เสร็จแล้ว') return 'ready';
    if (siteStatus === 'หน้างานไม่พร้อม') return 'not-ready';
    if (siteStatus === 'หน้างานพร้อม') return 'ready-now';
    return '';
  }

  async function loadMyRequests() {
    const container = document.getElementById('my-requests-list');
    container.innerHTML = '<p class="hint">กำลังโหลด...</p>';

    if (!lineProfile) {
      container.innerHTML = '<p class="hint">ไม่พบข้อมูลผู้ใช้ LINE กรุณาเปิดผ่านแอป LINE</p>';
      return;
    }
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=myRequests&userId=' + encodeURIComponent(lineProfile.userId));
      const result = await res.json();
      if (result.status !== 'ok') throw new Error(result.message);

      if (result.requests.length === 0) {
        container.innerHTML = '<p class="hint">คุณยังไม่มีคำขอ</p>';
        return;
      }

      container.innerHTML = '';
      result.requests.forEach(r => {
        const canEdit = r.status === 'รอจัดคิว';
        const canUpdateSite = r.status !== 'ยกเลิกโดยผู้ขอ';
        const card = document.createElement('div');
        card.className = 'request-card';
        card.innerHTML = `
          <div class="request-card-header">
            <span class="status-badge status-${statusClass(r.status)}">${r.status}</span>
            <span class="hint">${r.requestedAt}</span>
          </div>
          <div><strong>${r.site}</strong></div>
          <div>${r.material} ${r.quantity} ${r.unit} — วันเริ่มงาน ${r.startDate}</div>
          ${r.location ? `<div class="hint">📍 <a href="${escapeHtml(locationHref(r.location))}" target="_blank" rel="noopener">ดูพิกัดปลายทาง</a></div>` : ''}
          ${r.assigned ? `<div class="hint">แจกงาน: ${r.assigned}</div>` : ''}
          ${canEdit ? `<div class="card-actions">
              <button class="btn-small edit-btn">แก้ไข</button>
              <button class="btn-small cancel-btn">ยกเลิก</button>
            </div>` : ''}
          ${canUpdateSite ? `
            <div class="site-status-section">
              ${r.siteStatus ? `<span class="site-status-current ${siteStatusClass(r.siteStatus)}">
                  หน้างาน: ${r.siteStatus} (${r.siteStatusUpdatedAt || ''})
                </span>` : ''}
              <div class="site-status-buttons">
                <button class="btn-tiny status-yellow" data-status="ยังไม่เสร็จ">🟡 ยังไม่เสร็จ</button>
                <button class="btn-tiny status-green" data-status="เสร็จแล้ว">🟢 เสร็จแล้ว</button>
                <button class="btn-tiny status-red" data-status="หน้างานไม่พร้อม">🔴 ไม่พร้อม</button>
                <button class="btn-tiny status-blue" data-status="หน้างานพร้อม">🔵 พร้อมแล้ว</button>
              </div>
              ${r.note ? `<div class="site-note-log">${escapeHtml(r.note)}</div>` : ''}
            </div>` : ''}
        `;
        if (canEdit) {
          card.querySelector('.edit-btn').addEventListener('click', () => startEdit(r));
          card.querySelector('.cancel-btn').addEventListener('click', () => doCancel(r.requestId));
        }
        if (canUpdateSite) {
          card.querySelectorAll('.btn-tiny').forEach(btn => {
            btn.addEventListener('click', () => doUpdateSiteStatus(r.requestId, btn.dataset.status));
          });
        }
        container.appendChild(card);
      });
    } catch (err) {
      container.innerHTML = '<p class="hint" style="color:#d64545">โหลดไม่สำเร็จ: ' + err.message + '</p>';
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', loadMyRequests);

  // ---------- tab switching ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'my-requests-view') loadMyRequests();
    });
  });

  // ---------- init ----------
  setupSearchable('requester-input', 'requester-list', () => optionsData.requesters);
  setupSearchable('site-input', 'site-list', () => optionsData.sites);
  setupSearchable('material-input', 'material-list', () => optionsData.materials);
  setupSearchable('source-input', 'source-list', () => optionsData.sources);

  initLiff();
  loadOptions();
</script>

</body>
</html>
